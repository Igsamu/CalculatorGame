<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Juego</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Overlay de fin de partida -->
  <div id="overlay">
    <div class="overlay-box">
      <div class="overlay-icon" id="ov-icon">💀</div>
      <div class="overlay-title" id="ov-title">Has perdido</div>
      <div class="overlay-sub" id="ov-sub">3 errores cometidos. ¡Inténtalo de nuevo!</div>
      <button class="overlay-btn" id="ov-btn" onclick="restart()">Jugar de nuevo</button>
    </div>
  </div>

  <!-- Calculadora -->
  <div class="calculator">
    <div id="display">
      <div id="prevAns"></div>
      <div id="currentInput"></div>
    </div>
    <div class="buttons">
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button id="btn/" onclick="appendOperator('/')">/</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button id="btn*" onclick="appendOperator('*')">*</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button id="btn-" onclick="appendOperator('-')">-</button>

      <button onclick="appendNumber('0')">0</button>
      <button onclick="appendNumber('.')">.</button>
      <button onclick="clearDisplay()" class="clear">C</button>
      <button id="btn+" onclick="appendOperator('+')">+</button>

      <button onclick="calculate()" class="equals">=</button>
    </div>
  </div>

  <!-- Panel de juego -->
  <div class="game">
    <div class="game-meta">
      <span id="phase-badge" class="phase-badge phase-tutorial">Tutorial</span>
      <div class="hearts">
        <span class="heart" id="h0">♥</span>
        <span class="heart" id="h1">♥</span>
        <span class="heart" id="h2">♥</span>
      </div>
      <span id="q-counter">1/3</span>
    </div>
    <h2 id="question">Cargando...</h2>
    <p id="feedback"></p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
